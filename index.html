<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Judul Proyek Akhir - TRE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0;
        }
        .hero-section { 
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
            color: white; 
            padding: 60px 0; 
        }
        .card { 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }
        .btn-kembali {
            color: #1e3a8a;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .btn-kembali:hover { text-decoration: underline; }
        
        /* Modifikasi tampilan tabel */
        table.dataTable thead th {
            background-color: #1e3a8a;
            color: white;
            border-bottom: none;
        }
        .judul-kolom {
            min-width: 300px; /* Agar kolom judul TA cukup lebar */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top" style="border-bottom: 3px solid #1e3a8a;">
        <div class="container">
            <a class="navbar-brand" href="https://tresvugm.github.io/">
                <img src="images/logo-tre.png" alt="Logo TRE UGM" height="45" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarUtama">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarUtama">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-dark fw-semibold" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Layanan TRE
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                            <li><a class="dropdown-item d-flex align-items-center py-2" href="https://tresvugm.github.io/"><i class="bi bi-house-door me-2 text-primary"></i> Beranda</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Judul Proyek Akhir TRE</h1>
            <p class="lead opacity-75 mb-0">Rekapitulasi arsip judul Tugas Akhir mahasiswa Teknologi Rekayasa Elektro</p>
        </div>
    </header>

    <main class="container my-5">
        <a href="index.html" class="btn-kembali"><i class="bi bi-arrow-left me-2"></i> Kembali ke Menu Utama</a>

        <div class="card p-4">
            <div id="loadingIndicator" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Memuat data...</span>
                </div>
                <p class="mt-3 text-muted">Sinkronisasi data dengan database, mohon tunggu...</p>
            </div>

            <div class="table-responsive" id="tableContainer" style="display: none;">
                <table id="tabelJudulPA" class="table table-striped table-hover align-middle w-100">
                    <thead>
                        <tr>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Angkatan</th>
                            <th class="judul-kolom">Judul Tugas Akhir</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-center py-5 text-muted border-top mt-5">
        <p>&copy; 2026 Teknologi Rekayasa Elektro</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // ==========================================
        // 1. MASUKKAN ID SPREADSHEET ANDA DI SINI!
        // ==========================================
        const SPREADSHEET_ID = '1SMoRbwnRhiDWBy0a1EC2TbgPCLS8piFR'; 
        
        // Google Sheets export URL format (Otomatis mengubah Sheet menjadi CSV)
        const URL_GOOGLE_SHEETS = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        // ==========================================
        // 2. FUNGSI MENGAMBIL DATA & MEMBANGUN TABEL
        // ==========================================
        Papa.parse(URL_GOOGLE_SHEETS, {
            download: true,
            header: true, // Membaca baris pertama sebagai nama kolom
            complete: function(results) {
                const data = results.data;
                const tbody = document.getElementById('isiTabel');
                
                // Looping setiap baris data dari Excel
                data.forEach(row => {
                    // Mencegah baris kosong (blank row) terbaca
                    if(!row['NIM'] || !row['Nama']) return; 

                    const tr = document.createElement('tr');
                    
                    // Menentukan isi tombol berdasarkan ketersediaan Link ETD
                    let tombolEtd = '';
                    let linkRaw = row['Link ETD'] ? row['Link ETD'].trim() : '';
                    
                    if(linkRaw.startsWith('http')) {
                        tombolEtd = `<a href="${linkRaw}" target="_blank" class="btn btn-sm btn-primary"><i class="bi bi-box-arrow-up-right me-1"></i> Buka ETD</a>`;
                    } else {
                        tombolEtd = `<span class="badge bg-secondary">Belum Tersedia</span>`;
                    }

                    // Menyusun sel tabel
                    tr.innerHTML = `
                        <td>${row['NIM']}</td>
                        <td>${row['Nama']}</td>
                        <td>${row['Angkatan']}</td>
                        <td class="fw-semibold text-dark">${row['Judul TA Indonesia']}</td>
                        <td>${tombolEtd}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Menyembunyikan ikon loading dan menampilkan tabel
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';

                // Mengaktifkan fitur DataTables (Search & Pagination)
                $('#tabelJudulPA').DataTable({
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json', // Menggunakan bahasa Indonesia
                    },
                    pageLength: 15, // Jumlah data per halaman
                    order: [[2, 'desc']] // Urutkan otomatis berdasarkan kolom Angkatan (terbaru ke terlama)
                });
            },
            error: function(error) {
                console.error("Gagal mengambil data dari Google Sheets:", error);
                document.getElementById('loadingIndicator').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> Gagal memuat data dari database. Pastikan link Google Sheets sudah disetel Publik (Siapa saja yang memiliki link).
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
